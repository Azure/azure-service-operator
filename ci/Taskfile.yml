#
# Taskfile for CI pipeline tasks.
# Not intended for standalone use, but only when imported into the main Taskfile.yml.
#

version: '3.7'

vars:
  TEST_OUT: '{{joinPath .TASKFILE_DIR ".." "reports"}}'

tasks:

  test-controllers:
    desc: Run tests of controllers with envtest
    summary: |
      Run tests of controllers with envtest, deliberately skipping dependencies that may result in a long setup time. 
      This is intended to be used in the CI pipeline, and not for local development.
    dir: "{{.CONTROLLER_ROOT}}"
    deps: 
      - setup
    cmds:
      - defer: # want to run even on failure
          task: produce-markdown-summary
          vars:
            INPUT_FILE: '{{.TEST_OUTPUT}}'
            OUTPUT_FILE: '{{.TEST_REPORT}}'
      - go test -count=1 -timeout {{.TIMEOUT}} -run '{{default ".*" .TEST_FILTER}}' {{.VERBOSE}} ./internal/controllers -json > {{.TEST_OUTPUT}}
    vars:
      VERBOSE:
        sh: if [ $TEST_FILTER ];  then echo "-v"; fi
      TIMEOUT: '{{default "25m" .TIMEOUT}}'  # Should be kept in sync with the tests below
      TEST_OUTPUT: '{{joinPath .TEST_OUT "test-controllers.json"}}'
      TEST_REPORT: '{{joinPath .TEST_OUT "test-controllers.md"}}'

  test-samples:
    desc: Run tests of samples with envtest
    summary: |
      Run tests of samples with envtest, deliberately skipping dependencies that may result in a long setup time. 
      This is intended to be used in the CI pipeline, and not for local development.
    dir: "{{.CONTROLLER_ROOT}}"
    deps: 
      - setup
    cmds:
      - defer: # want to run even on failure
          task: produce-markdown-summary
          vars:
            INPUT_FILE: '{{.TEST_OUTPUT}}'
            OUTPUT_FILE: '{{.TEST_REPORT}}'
      - go test -count=1 -timeout {{.TIMEOUT}} -run '{{default ".*" .TEST_FILTER}}' {{.VERBOSE}} ./internal/testsamples -json > {{.TEST_OUTPUT}}
    vars:
      VERBOSE:
        sh: if [ $TEST_FILTER ];  then echo "-v"; fi
      TIMEOUT: '{{default "25m" .TIMEOUT}}'  # Should be kept in sync with the tests below
      TEST_OUTPUT: '{{joinPath .TEST_OUT "test-samples.json"}}'
      TEST_REPORT: '{{joinPath .TEST_OUT "test-samples.md"}}'

  setup:
    internal: true
    cmds:
      - echo "Test output will be stored in {{.TEST_OUT}}"
      - mkdir -p {{.TEST_OUT}}

  build-mangle-test:
    desc: Builds the tool we use for mangling test results
    dir: '{{joinPath .TASKFILE_DIR ".."  "v2" "tools" "mangle-test-json"}}' 
    cmds:
      - go build

  produce-markdown-summary:
    desc: Builds a test output summary for Github
    deps: 
       - build-mangle-test
    cmds:
      - cmd: ./v2/tools/mangle-test-json/mangle-test-json "{{.INPUT_FILE}}" > "{{.OUTPUT_FILE}}"
