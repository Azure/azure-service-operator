name: Publish helm charts
on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref or full SHA of commit to generate Helm chart for'
        required: true
        default: 'main'
  # run when a release is published,
  # which creates a new tag
  push:
    tags:
      - v2*

permissions: {}

env:
  ref: "${{ github.event.inputs.ref || github.ref_name }}"

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read

    # Only run this scheduled job on the main repo, it can't work elsewhere
    if: ${{ github.repository == 'Azure/azure-service-operator' }}

    steps:
      - name: Create token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # pinned to v3.2.0
        id: app-token
        with:
          # required
          app-id: ${{ secrets.AUTOMATION_ID }}
          private-key: ${{ secrets.AUTOMATION_KEY }}
          
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # pinned to 7.0.0
        with:
          ref: ${{ env.ref }}
          fetch-depth: 0 # required to access tags
          submodules: 'true'

      - name: Get SHA
        run: |
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Create Branch
        uses: peterjgrainger/action-create-branch@4b81ce657e255acd677cc6c55c9c763654be3aef # pinned to v4.0.0
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          branch: ${{ format('bot/update-helm-chart-{0}', env.ref) }}
          sha: ${{ env.sha }}

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # pinned to 7.0.0
        with:
          ref: ${{ format('bot/update-helm-chart-{0}', env.ref) }}
          fetch-depth: 0 # required to access tags
          submodules: 'true'

      - name: Log in to GitHub Docker Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # pinned to v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build devcontainer image
        run: |
          docker build --cache-from ghcr.io/azure/azure-service-operator/aso-devcontainer:latest --tag devcontainer:latest -f .devcontainer/Dockerfile .
        env:
          DOCKER_BUILDKIT: 1

      - name: Run devcontainer image
        id: devcontainer
        run: |
          container_id=$(docker create -w /workspace -v $GITHUB_WORKSPACE:/workspace -v /var/run/docker.sock:/var/run/docker.sock devcontainer:latest)
          docker start "$container_id"
          echo "container_id=$container_id" >> $GITHUB_ENV

      - name: Generate helm manifest
        run: |
          container_id=${{ env.container_id }}
          docker exec "$container_id" task controller:package-helm-manifest

      # Workaround for getting "Permission denied" errors when trying to stage files
      - name: Take Ownership
        run: sudo chown -R $USER:$USER .

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # pinned to v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: Add Helm Chart
          branch: ${{ format('bot/update-helm-chart-{0}', env.ref) }}
          base: main
          delete-branch: true
          title: "chore: Add Helm Chart [Automated]"
          body: |
            Add new helm chart for latest release

            Auto-generated by [create-pull-request][1]

            [1]: https://github.com/peter-evans/create-pull-request
          labels: |
            automated pr
