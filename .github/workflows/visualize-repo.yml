name: Render Source Visualizations
on:
  workflow_dispatch:
    # no content, allows manual triggering

  schedule:
    # 5:35 pm every Sunday (UTC)
    # to ensure the images are never too stale
    - cron: "35 17 * * 0"

permissions: {}

jobs:
  render:
    
    runs-on: ubuntu-latest

    permissions:
      contents: read

    # Only run this scheduled job on the main repo, it can't work elsewhere
    if: ${{ github.repository == 'Azure/azure-service-operator' }}

    steps:
      - name: Create token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # pinned to v3.2.0
        id: app-token
        with:
          # required
          app-id: ${{ secrets.AUTOMATION_ID }}
          private-key: ${{ secrets.AUTOMATION_KEY }}
          
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # pinned to 7.0.1
        with:
          ref: main

      - name: Create Branch
        uses: peterjgrainger/action-create-branch@4b81ce657e255acd677cc6c55c9c763654be3aef # pinned to v4.0.0
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          branch: "bot/update-diagrams"

      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # pinned to 7.0.1
        with:
          ref: bot/update-diagrams

      - name: Update ASO v2 diagram
        uses: githubocto/repo-visualizer@a999615bdab757559bf94bda1fe6eef232765f85
        with:
          # Paths are relative to root_path
          excluded_paths: "ignore,.github,tools,cmd"
          output_file: "docs/hugo/content/contributing/aso-v2-structure.svg"
          root_path: "v2"
          commit_message: "Updating visualization for ASO v2"
          should_push: false

      - name: Update asoctl diagram
        uses: githubocto/repo-visualizer@a999615bdab757559bf94bda1fe6eef232765f85
        with:
          excluded_paths: "ignore,.github"
          output_file: "docs/hugo/content/contributing/asoctl-structure.svg"
          root_path: "v2/cmd/asoctl"
          commit_message: "Updating visualization for asoctl"
          should_push: false

      - name: Update ASO Code Generator diagram
        uses: githubocto/repo-visualizer@a999615bdab757559bf94bda1fe6eef232765f85
        with:
          excluded_paths: "ignore,.github"
          output_file: "docs/hugo/content/contributing/aso-codegen-structure.svg"
          root_path: "v2/tools/generator"
          commit_message: "Updating visualization for the code generator"
          should_push: false

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # pinned to v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: Update Code Structure Diagrams
          branch: bot/update-diagrams
          base: main
          delete-branch: true
          title: "chore: Update Code Structure Diagrams [Automated]"
          body: |
            Update visualisation diagrams showing the structure of ASO code

            Auto-generated by [create-pull-request][1]

            [1]: https://github.com/peter-evans/create-pull-request
          labels: |
            automated pr
