  containerinstance: azure-arm/containerinstance.yaml
  containerregistry: azure-arm/containerregistry.yaml
  containerservice: azure-arm/containerservice.yaml
  datafactory: azure-arm/datafactory.yaml
  dataprotection: azure-arm/dataprotection.yaml
  dbformariadb: azure-arm/dbformariadb.yaml
  dbformysql: azure-arm/dbformysql.yaml
  dbforpostgresql: azure-arm/dbforpostgresql.yaml
  devices: azure-arm/devices.yaml
