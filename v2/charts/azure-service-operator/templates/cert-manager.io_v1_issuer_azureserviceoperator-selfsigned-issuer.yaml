{{- if or (eq .Values.multitenant.enable false) (eq .Values.azureOperatorMode "webhooks") (and .Values.metrics.enable .Values.metrics.secure) }}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: azureserviceoperator-selfsigned-issuer
  namespace: {{ .Release.Namespace }}
spec:
  selfSigned: {}
{{- end }}
