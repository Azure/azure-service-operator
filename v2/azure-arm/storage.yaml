typeTransformers:
  - name: NetworkRuleSet # This type is subsequently flattened into NamespacesTopics_Spec
    property: Bypass
    target:
      name: string
      optional: true
    because: The enum restrictions on this type are incomplete. Storage allows a,b,c but doesn't document that in the enum.

