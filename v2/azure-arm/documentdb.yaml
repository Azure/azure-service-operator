typeTransformers:
  - name: Location # This type is subsequently flattened into NamespacesTopics_Spec
    property: ProvisioningState
    remove: true
    because: This property should have been marked readonly but wasn't.
  - name: DatabaseAccountCreateUpdateProperties
    property: CustomerManagedKeyStatus
    remove: true
    because: This property should have been marked readonly but wasn't.
  - name: MongoRoleDefinitionResource_STATUS # This type is subsequently flattened into MongoRoleDefinition_STATUS
    property: Type
    remove: true
    because: This property is documented as a string but returned as an int. See https://github.com/Azure/azure-service-operator/issues/4559 and https://github.com/Azure/azure-rest-api-specs/issues/23062.
  - name: CassandraCluster_Properties_Spec
    property: Deallocated
    remove: true
    because: This property should have been marked readonly but wasn't.
  - name: CassandraCluster_Properties_Spec
    property: ProvisionError
    remove: true
    because: This property should have been marked readonly but wasn't.
  - name: CassandraCluster_Properties_Spec
    property: ProvisioningState
    remove: true
    because: This property should have been marked readonly but wasn't.
  - name: CassandraClusters_DataCenter_Properties_Spec
    property: Deallocated
    remove: true
    because: This property should have been marked readonly but wasn't.
  - name: CassandraClusters_DataCenter_Properties_Spec
    property: ProvisionError
    remove: true
    because: This property should have been marked readonly but wasn't.
  - name: CassandraClusters_DataCenter_Properties_Spec
    property: ProvisioningState
    remove: true
    because: This property should have been marked readonly but wasn't.
