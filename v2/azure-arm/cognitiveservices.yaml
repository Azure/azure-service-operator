typeTransformers:
  - name: DeploymentProperties
    property: CurrentCapacity
    remove: true
    because: This property is read-only and cannot be set by the user.

groupModelConfiguration:
  2025-06-01:
    Account:
      $exportAs: Account
      $supportedFrom: v2.15.0
      $azureGeneratedSecrets:
        - Key1
        - Key2
    AccountProperties:
      MigrationToken:
        $importSecretMode: required
    Accounts_Deployment:
      $exportAs: Deployment
      $supportedFrom: v2.15.0
    Accounts_Project:
      $exportAs: Project
      $supportedFrom: v2.20.0
    ApiProperties:
      AadTenantId:
        $importConfigMapMode: optional
      AadClientId:
        $importConfigMapMode: optional
      EventHubConnectionString:
        $importSecretMode: required
      QnaAzureSearchEndpointId:
        $importConfigMapMode: optional
      QnaAzureSearchEndpointKey:
        $importSecretMode: required
      QnaRuntimeEndpoint:
        $importConfigMapMode: optional
      StorageAccountConnectionString:
        $importSecretMode: required
      SuperUser:
        $importConfigMapMode: optional
      WebsiteName:
        $importConfigMapMode: optional
    DeploymentModel:
      Format:
        $importConfigMapMode: optional
      Name:
        $importConfigMapMode: optional
      Publisher:
        $importConfigMapMode: optional
      Source:
        $referenceType: arm
      Version:
        $importConfigMapMode: optional
    RaiMonitorConfig:
      AdxStorageResourceId:
        $referenceType: arm
    UserOwnedAmlWorkspace:
      ResourceId:
        $referenceType: arm
    UserOwnedStorage:
      ResourceId:
        $referenceType: arm
    VirtualNetworkRule:
      Id:
        $referenceType: arm
