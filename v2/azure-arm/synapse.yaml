typeTransformers:
  - name: KekIdentityProperties;KekIdentityProperties_STATUS
    property: UseSystemAssignedIdentity
    target:
      name: bool
      optional: true
    because: UseSystemAssignedIdentity is a boolean but the Swagger is missing the type annotation

groupModelConfiguration:
  2021-06-01:
    KekIdentityProperties:
      UserAssignedIdentity:
        $referenceType: arm
    DataLakeStorageAccountDetails:
      ResourceId:
        $referenceType: arm
      AccountUrl:
        $importConfigMapMode: optional
    PurviewConfiguration:
      PurviewResourceId:
        $referenceType: arm
    Workspace:
      $exportAs: Workspace
      $supportedFrom: v2.0.0
    WorkspaceProperties:
      SqlAdministratorLoginPassword:
        $importSecretMode: required
    Workspaces_BigDataPool:
      $exportAs: WorkspacesBigDataPool
      $supportedFrom: v2.0.0
