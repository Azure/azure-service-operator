typeFilters:
  - action: include
    version: v*20180501preview
    because: We're using webTests from this. There is a "newer" version but it's not actually supported, see https://github.com/Azure/azure-rest-api-specs/issues/14827
  - action: include
    version: v*20210501preview
    because: We're using DiagnosticSetting from this.
    # Latest non-preview version is not supported, see https://github.com/Azure/bicep-types-az/issues/2185
  - action: include
    version: v*20240101preview
    because: We need ScheduledQueryRules from this.
  - action: include
    version: v*20250101preview
    because: We need the latest ScheduledQueryRules from this.
  - action: include
    version: v*20240301preview
    because: Cross references from other preview versions

typeTransformers:
  #
  # In the group 'insights'
  # rename the object 'AutoscaleSetting' 
  # to 'AutoscaleSettingProperties'.
  #
  # Using object: true so that we don't rename the 
  # resource `Autoscalesetting` (with a lowercase 's') as well
  #
  - name: AutoscaleSetting
    renameTo: AutoscaleSettingProperties
    ifType:
      object: true
    because: We want to use the name `AutoscaleSetting` (with a capital 'S') for the resource
  # Deal with resources that have tags or location included but shouldn't have (proxy resources, etc).
  # See https://github.com/Azure/azure-resource-manager-schemas/issues/1850

  # Deal with service Swaggers that are just wrong
  - name: Webtest_Spec
    property: Kind
    remove: true
    because: This shouldn't be here, it's supposed to be on the Properties type (and is already). They somehow accidentally duplicated it.

  - name: WebTest_Status
    property: Kind
    remove: true
    because: This shouldn't be here, it's supposed to be on the Properties type (and is already). They somehow accidentally duplicated it.

  - name: Workbook_Spec
    property: Etag
    remove: true
    because: This property should be marked readonly in Swagger

  - name: DataCollectionEndpointSpec
    property: ImmutableId
    remove: true
    because: This property should be marked readonly in Swagger

  - name: DataFlow;DataFlow_STATUS
    property: Streams
    target:
      slice:
        element:
          name: string
    because: The enum restrictions on this type are incomplete. The service supports additional stream values like Microsoft-PrometheusMetrics that aren't listed in the enum. See https://github.com/Azure/azure-service-operator/issues/5350

  - name: PerfCounterDataSource;PerfCounterDataSource_STATUS;ExtensionDataSource;ExtensionDataSource_STATUS;PrometheusForwarderDataSource;PrometheusForwarderDataSource_STATUS;SyslogDataSource;SyslogDataSource_STATUS;WindowsEventLogDataSource;WindowsEventLogDataSource_STATUS
    property: Streams
    target:
      slice:
        element:
          name: string
    because: The enum restrictions on this type are incomplete. The service supports additional stream values like Microsoft-PrometheusMetrics that aren't listed in the enum. See https://github.com/Azure/azure-service-operator/issues/5350

  - name: ExtensionDataSource;ExtensionDataSource_STATUS
    property: ExtensionSettings
    target:
      map:
        key:
          name: string
        value:
          name: any
    because: some ExtensionSettings are defined as map[string]any and some are defined as any  

  - name: AlertSeverity;AlertSeverity_STATUS
    target:
      enum: 
        base: int
        values: [0,1,2,3,4]
    because: Using float64 as the underlying type for an int enum is weird and causes conversion problems with earlier versions of the resource.

