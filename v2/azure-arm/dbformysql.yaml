typeFilters:
  - action: include
    version: v*20250601preview
    because: We want to export this particular preview version to support newer MySQL versions
typeTransformers:
  - name: ServerProperties;ServerProperties_STATUS
    property: Version
    target:
      name: string
      optional: true
    because: The enum restrictions on this type are incorrect, both leaving out the latest supported versions of MySQL and including deprecated versions.
groupModelConfiguration:
  v1: # Handcrafted 
    User:
      $supportedFrom: v2.0.0
  2021-05-01:
    DataEncryption:
      GeoBackupUserAssignedIdentityId:
        $referenceType: arm
      PrimaryUserAssignedIdentityId:
        $referenceType: arm
    FlexibleServer:
      $exportAs: FlexibleServer
      $supportedFrom: v2.0.0-alpha.2
