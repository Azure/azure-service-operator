typeTransformers:
  - name: DataPlaneAuthOptions
    property: ApiKeyOnly
    remove: true
    because: We need a better handling for JSON # Discussion: https://github.com/Azure/azure-service-operator/pull/2916/files/93b06daa9549a91ac626e3241c5987b23b4087ac#r1179803300
groupModelConfiguration:
  2022-09-01:
    SearchService:
      $exportAs: SearchService
      $supportedFrom: v2.1.0
      $azureGeneratedSecrets:
        - AdminPrimaryKey
        - AdminSecondaryKey
        - QueryKey
      $generatedConfigs:
        IdentityPrincipalId: $.Status.Identity.PrincipalId
        IdentityTenantId: $.Status.Identity.TenantId
  2023-11-01:
    SearchService:
      $exportAs: SearchService
      $supportedFrom: v2.14.0
      $azureGeneratedSecrets:
        - AdminPrimaryKey
        - AdminSecondaryKey
        - QueryKey
      $generatedConfigs:
        IdentityPrincipalId: $.Status.Identity.PrincipalId
        IdentityTenantId: $.Status.Identity.TenantId
