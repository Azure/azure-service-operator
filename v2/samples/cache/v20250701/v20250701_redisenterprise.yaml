# This sample demonstrates how to create a Redis Enterprise cluster using the v20250701 API version.
# This version adds support for the publicNetworkAccess flag, which controls whether the cluster can
# be reached over the public network.
# ASO represents Azure Managed Redis as RedisEnterprise because naming follows the ARM resource type.
apiVersion: cache.azure.com/v20250701
kind: RedisEnterprise
metadata:
  name: sampleredisenterprise
  namespace: default
spec:
  location: westus2
  owner:
    name: aso-sample-rg
  minimumTlsVersion: "1.2"
  highAvailability: Enabled
  publicNetworkAccess: Enabled
  sku:
    name: Balanced_B0
  zones:
    - "1"
    - "2"
    - "3"
  tags:
    environment: sample
    application: redis-enterprise
    managed-by: azure-service-operator
  identity:
    type: None
