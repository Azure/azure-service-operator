# This sample demonstrates how to create a Redis Enterprise cluster using the v20250401 API version.
# This version includes new features like high availability configuration.
# ASO represents Azure Managed Redis as RedisEnterprise because naming follows the ARM resource type.
apiVersion: cache.azure.com/v20250401
kind: RedisEnterprise
metadata:
  name: sampleredisenterprise
  namespace: default
spec:
  location: westus2
  owner:
    name: aso-sample-rg
  minimumTlsVersion: "1.2"
  highAvailability: Enabled
  sku:
    name: Balanced_B0
  tags:
    environment: sample
    application: redis-enterprise
    managed-by: azure-service-operator
  identity:
    type: None
