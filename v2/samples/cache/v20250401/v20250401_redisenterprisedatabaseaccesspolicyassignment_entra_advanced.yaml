# Advanced Entra ID sample for RedisEnterpriseDatabaseAccessPolicyAssignment.
# Apply the required dependencies first:
# - a RedisEnterprise instance
# - a RedisEnterpriseDatabase owned by that RedisEnterprise
# - a UserAssignedIdentity whose principalId is available in the identity-settings ConfigMap
apiVersion: cache.azure.com/v20250401
kind: RedisEnterpriseDatabaseAccessPolicyAssignment
metadata:
  name: sampleaccesspolicyassignment
  namespace: default
spec:
  owner:
    name: default
  accessPolicyName: default
  user:
    objectIdFromConfig:
      name: identity-settings
      key: principalId
