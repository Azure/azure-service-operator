# Advanced Entra ID sample for RedisEnterpriseDatabaseAccessPolicyAssignment.
# Required dependencies for this sample:
# - RedisEnterprise named 'sampleredisent' in namespace 'default'
#   (v2/samples/cache/v20250401/refs/v1api20250401_redisenterprise.yaml)
# - RedisEnterpriseDatabase named 'default' owned by 'sampleredisent'
#   (v2/samples/cache/v20250401/refs/v1api20250401_redisenterprisedatabase.yaml)
# - UserAssignedIdentity with principalId written to ConfigMap 'identity-settings-advanced'
#   (v2/samples/cache/v20250401/refs/v1api20181130_userassignedidentity_advanced.yaml)
# These resources can be applied together; ASO reconciles dependency ordering.
apiVersion: cache.azure.com/v20250401
kind: RedisEnterpriseDatabaseAccessPolicyAssignment
metadata:
  name: sampleaccesspolicyassignmentadvanced
  namespace: default
spec:
  owner:
    name: default
  accessPolicyName: default
  user:
    objectIdFromConfig:
      name: identity-settings-advanced
      key: principalId
