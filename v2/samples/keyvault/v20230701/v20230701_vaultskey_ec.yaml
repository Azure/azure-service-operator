# VaultsKey (EC variant) manages an Elliptic Curve cryptographic key inside an existing
# Key Vault (Microsoft.KeyVault/vaults/keys).
#
# This is a minimal EC example. See v20230701_vaultskey.yaml (the RSA sample) for full
# details on this resource's semantics, including:
#   - key material is generated by Azure, never supplied via this CR (generation-only)
#   - all spec fields are immutable after creation
#   - deleting this CR does NOT disable, modify, or delete/purge the key in Azure by default
#     (ASO has no ARM operation capable of doing so); the finalizer is blocked instead
apiVersion: keyvault.azure.com/v20230701
kind: VaultsKey
metadata:
  name: samplevaultskey-ec
  namespace: default
spec:
  owner:
    name: samplevault
  properties:
    kty: EC
    curveName: P-256
    attributes:
      enabled: true
      # exportable must be false (or omitted) - true is unconditionally rejected by the
      # validating webhook for this resource.
      exportable: false
