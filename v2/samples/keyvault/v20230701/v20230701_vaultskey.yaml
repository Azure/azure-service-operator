# VaultsKey manages an RSA cryptographic key inside an existing Key Vault
# (Microsoft.KeyVault/vaults/keys).
#
# IMPORTANT - please read before using this resource:
#
# 1. Generation-only: Azure Key Vault generates the key material itself when this
#    resource is created. There is no field on this resource (and none in the underlying
#    ARM API) through which key material can be supplied - this resource cannot be used to
#    import an existing key. Private key material never transits the Kubernetes cluster,
#    this CR, or any Secret.
#
# 2. Immutable after creation: every field under spec.properties (kty, keySize, curveName,
#    keyOps, attributes, releasePolicy, rotationPolicy) and spec.tags is immutable once the
#    resource has been created in Azure. A validating webhook rejects any attempt to change
#    them. To change key parameters, delete this resource and create a new one.
#
# 3. Deletion does not destroy the key: Microsoft.KeyVault/vaults/keys has no ARM DELETE
#    operation. Under the default "manage" reconcile-policy, deleting this CR disables the
#    key in Azure Key Vault (sets attributes.enabled=false) but does NOT delete/purge it, and
#    the Kubernetes finalizer is deliberately not removed until this is resolved. See the
#    resource's reference documentation for the full deletion/lifecycle story, including how
#    to detach the Kubernetes object while leaving the key active in Azure.
apiVersion: keyvault.azure.com/v20230701
kind: VaultsKey
metadata:
  name: samplevaultskey
  namespace: default
spec:
  owner:
    name: samplevault
  properties:
    kty: RSA
    keySize: 2048
    keyOps:
      - sign
      - verify
      - wrapKey
      - unwrapKey
    attributes:
      enabled: true
      # exportable must be false (or omitted) - true is unconditionally rejected by the
      # validating webhook for this resource.
      exportable: false
    rotationPolicy:
      lifetimeActions:
        - action:
            type: notify
          trigger:
            # Notify 30 days before the key's expiry date.
            timeBeforeExpiry: P30D
        - action:
            type: rotate
          trigger:
            # Rotate the key 90 days after it was created.
            timeAfterCreate: P90D
  tags:
    team: identity
    environment: sample
