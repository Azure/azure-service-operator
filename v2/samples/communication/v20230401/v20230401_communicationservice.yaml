apiVersion: communication.azure.com/v20230401
kind: CommunicationService
metadata:
  name: aso-sample-communicationservice
  namespace: default
spec:
  location: global
  owner:
    name: aso-sample-rg
  dataLocation: UnitedStates
  operatorSpec:
    secrets:
      primaryKey:
        name: communicationservicesecret
        key: primaryKey
      primaryConnectionString:
        name: communicationservicesecret
        key: primaryConnectionString
      secondaryKey:
        name: communicationservicesecret
        key: secondaryKey
      secondaryConnectionString:
        name: communicationservicesecret
        key: secondaryConnectionString
    configMaps:
      hostName:
        name: communicationserviceconfig
        key: hostName
