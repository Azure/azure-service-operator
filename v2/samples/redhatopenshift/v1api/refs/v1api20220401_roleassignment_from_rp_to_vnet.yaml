apiVersion: authorization.azure.com/v1api20220401
kind: RoleAssignment
metadata:
  name: aso-sample-sp-to-vnet
  namespace: default
spec:
  # This resource can be owner by any resource. In this example we've chosen a resource group for simplicity
  owner:
    name: samplevnet
    group: network.azure.com
    kind: VirtualNetwork
  # This is the Principal ID of the AAD identity to which the role will be assigned.
  # This can be fetched by using `az ad sp list --display-name "Azure Red Hat OpenShift RP" --query "[0].id" -o tsv` command
  principalId: 00000000-0000-0000-0000-000000000000
  roleDefinitionReference:
    # ASO allows you to specify Azure built-in roles by name instead of the published GUID. Lookup is case insensitive.
    # For a roleDefinition you've created yourself, use either group/kind/name or armID.
    wellKnownName: contributor
