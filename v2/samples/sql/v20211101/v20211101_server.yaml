apiVersion: sql.azure.com/v20211101
kind: Server
metadata:
  name: aso-sample-sqlserver
  namespace: default
spec:
  owner:
    name: aso-sample-rg
  location: australiaeast
  administrators:
    administratorType: ActiveDirectory
    azureADOnlyAuthentication: true
    principalType: Application
    loginFromConfig:
      name: sql-admin-mi-config
      key: name
    sidFromConfig:
      name: sql-admin-mi-config
      key: principalId
    tenantIdFromConfig:
      name: sql-admin-mi-config
      key: tenantId
  version: "12.0"

